<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Zmluvy – lokálna AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        textarea { width: 100%; height: 120px; }
        button { padding: 10px 20px; margin-top: 10px; }
        pre {
            background: #f4f4f4;
            padding: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>Vyhľadávanie v zmluvách</h2>

<textarea id="question" placeholder="Zadaj otázku, napr.:
Nachádza sa v zmluvách zmluvná pokuta?"></textarea>

<br>
<button onclick="ask()">Spýtať sa</button>

<h3>Odpoveď</h3>
<pre id="answer"></pre>

<script>
async function ask() {
    const q = document.getElementById("question").value;
    document.getElementById("answer").textContent = "⏳ spracovávam...";

    const response = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q })
    });

    const data = await response.json();
    document.getElementById("answer").textContent = data.answer;
}
</script>

</body>
</html>
